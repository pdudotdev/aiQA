---
# OSPF Timer Mismatch Tests — A1M (routeros) ↔ D2B (aos)
# RFC 2328 §10.5: Hello and dead timers must match for adjacency to form.
# Cross-vendor pair → bidirectional (4 tests).

##############################################################################
# TMISMATCH-01: Hello-interval mismatch — setup A1M, verify D2B
##############################################################################
- name: "TMISMATCH-01 | Hello mismatch — setup A1M, verify D2B"
  hosts: A1M
  gather_facts: false
  vars:
    rfc: "RFC 2328 §10.5"
    criterion: TMISMATCH-01
    peer_host: D2B
    setup_cli: '/routing ospf interface-template set [find where networks~"10.1.1.4"] hello-interval=15'
    teardown_cli: '/routing ospf interface-template set [find where networks~"10.1.1.4"] hello-interval='
    snapshot_cli: "/routing ospf interface print detail without-paging where interface=ether3"
    snapshot_field: hello-interval
    snapshot_expected: "10"
    query_cli: "show ip ospf neighbors"
    assert_field: state
    assert_expected: "Full"
    assert_match_rid: "1.1.1.1"
    wait_seconds: 45
  tasks:
    - name: "[{{ criterion }}] Hello mismatch — setup A1M, verify D2B"
      block:
        - name: "Pre-flight — verify baseline hello-interval on A1M"
          ansible.netcommon.cli_command:
            command: "{{ snapshot_cli }}"
          register: baseline
        - name: "Pre-flight assertion"
          ansible.builtin.assert:
            that: "'{{ snapshot_expected }}' in baseline.stdout"
            fail_msg: "Pre-flight failed: {{ snapshot_field }} != {{ snapshot_expected }}"

        - name: "Setup — set hello-interval=15 on A1M ether3"
          ansible.netcommon.cli_config:
            config: "{{ setup_cli }}"

        - name: "Wait for dead timer expiry"
          ansible.builtin.pause:
            seconds: "{{ wait_seconds }}"

        - name: "Verify — check neighbor state on D2B"
          ansible.netcommon.cli_command:
            command: "{{ query_cli }}"
          delegate_to: "{{ peer_host }}"
          register: result
        - name: "Assert adjacency is NOT Full"
          ansible.builtin.assert:
            that: "'Full' not in result.stdout or '{{ assert_match_rid }}' not in result.stdout"
            fail_msg: "[{{ criterion }}] Neighbor {{ assert_match_rid }} still Full on D2B"

      always:
        - name: "Teardown — revert hello-interval on A1M"
          ansible.netcommon.cli_config:
            config: "{{ teardown_cli }}"

        - name: "Wait for reconvergence"
          ansible.builtin.pause:
            seconds: "{{ wait_seconds }}"

        - name: "Verify rollback — check hello-interval restored on A1M"
          ansible.netcommon.cli_command:
            command: "{{ snapshot_cli }}"
          register: rollback_check
        - name: "Rollback assertion"
          ansible.builtin.assert:
            that: "'{{ snapshot_expected }}' in rollback_check.stdout"
            fail_msg: "ROLLBACK FAILED: {{ snapshot_field }} != {{ snapshot_expected }}"


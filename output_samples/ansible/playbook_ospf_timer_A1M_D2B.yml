---
# OSPF Timer Mismatch Tests — A1M (routeros) <-> D2B (aos)
#
# Criteria:
#   TMISMATCH-01  Hello interval mismatch (RFC 2328 Section 10.5)
#   TMISMATCH-02  Dead interval mismatch  (RFC 2328 Section 10.5)
#
# Both directions tested (cross-vendor pair).

# ══════════════════════════════════════════════════════════════════════════════
# TMISMATCH-01: Hello mismatch — Setup A1M, Verify D2B
# ══════════════════════════════════════════════════════════════════════════════
- name: "ospf_timer_TMISMATCH-01_A1M_D2B"
  hosts: D2B
  gather_facts: false
  vars:
    rfc: "RFC 2328 Section 10.5"
    criterion: TMISMATCH-01
    setup_device: A1M
    verify_device: D2B
  tasks:
    - name: "[TMISMATCH-01] Hello mismatch — set hello=15 on A1M, verify adjacency drops on D2B"
      block:
        # Pre-flight: verify baseline hello-interval on A1M
        - name: "Pre-flight — snapshot hello-interval on A1M"
          ansible.netcommon.cli_command:
            command: "/routing ospf interface print detail where interface=ether3 without-paging"
          register: baseline
          delegate_to: A1M

        - name: "Pre-flight — assert hello-interval is 10"
          ansible.builtin.assert:
            that: "'hello-interval' in baseline.stdout and '10' in baseline.stdout"
            fail_msg: "Pre-flight failed: hello-interval not at baseline 10s on A1M"

        # Setup: configure mismatched hello on A1M
        - name: "Setup — set hello-interval 15s on A1M ether3"
          ansible.netcommon.cli_config:
            config: '/routing ospf interface-template set [find where networks~"10.1.1.4"] hello-interval=15'
          delegate_to: A1M

        - name: "Wait for dead timer expiry"
          ansible.builtin.pause:
            seconds: 45

        # Verify: check neighbor state on D2B
        - name: "Verify — check OSPF neighbor state on D2B"
          ansible.netcommon.cli_command:
            command: "show ip ospf neighbors"
          register: result

        - name: "Assert — neighbor 1.1.1.1 is NOT Full on D2B"
          ansible.builtin.assert:
            that: "'Full' not in result.stdout or '1.1.1.1' not in result.stdout"
            fail_msg: "[TMISMATCH-01] Neighbor 1.1.1.1 is still Full on D2B after hello mismatch"

      always:
        # Teardown: revert hello-interval on A1M
        - name: "Teardown — revert hello-interval on A1M"
          ansible.netcommon.cli_config:
            config: '/routing ospf interface-template set [find where networks~"10.1.1.4"] hello-interval='
          delegate_to: A1M

        - name: "Wait for reconvergence"
          ansible.builtin.pause:
            seconds: 45

        - name: "Verify rollback — hello-interval on A1M"
          ansible.netcommon.cli_command:
            command: "/routing ospf interface print detail where interface=ether3 without-paging"
          register: rollback_check
          delegate_to: A1M

        - name: "Assert rollback — hello-interval restored to 10"
          ansible.builtin.assert:
            that: "'10' in rollback_check.stdout"
            fail_msg: "ROLLBACK FAILED: hello-interval not restored to 10s on A1M"

# ══════════════════════════════════════════════════════════════════════════════
# TMISMATCH-01: Hello mismatch — Setup D2B, Verify A1M
# ══════════════════════════════════════════════════════════════════════════════
- name: "ospf_timer_TMISMATCH-01_D2B_A1M"
  hosts: A1M
  gather_facts: false
  vars:
    rfc: "RFC 2328 Section 10.5"
    criterion: TMISMATCH-01
    setup_device: D2B
    verify_device: A1M
  tasks:
    - name: "[TMISMATCH-01] Hello mismatch — set hello=15 on D2B, verify adjacency drops on A1M"
      block:
        # Pre-flight: verify baseline hello-interval on D2B
        - name: "Pre-flight — snapshot hello-interval on D2B"
          ansible.netcommon.cli_command:
            command: "show ip ospf interface 1/1/2"
          register: baseline
          delegate_to: D2B

        - name: "Pre-flight — assert hello-interval is 10"
          ansible.builtin.assert:
            that: "'10' in baseline.stdout"
            fail_msg: "Pre-flight failed: hello-interval not at baseline 10s on D2B"

        # Setup: configure mismatched hello on D2B
        - name: "Setup — set hello-interval 15s on D2B 1/1/2"
          ansible.netcommon.cli_config:
            config: |
              interface 1/1/2
              ip ospf hello-interval 15
          delegate_to: D2B

        - name: "Wait for dead timer expiry"
          ansible.builtin.pause:
            seconds: 45

        # Verify: check neighbor state on A1M
        - name: "Verify — check OSPF neighbor state on A1M"
          ansible.netcommon.cli_command:
            command: "/routing ospf neighbor print detail without-paging"
          register: result

        - name: "Assert — neighbor 11.11.11.22 is NOT Full on A1M"
          ansible.builtin.assert:
            that: "'Full' not in result.stdout or '11.11.11.22' not in result.stdout"
            fail_msg: "[TMISMATCH-01] Neighbor 11.11.11.22 is still Full on A1M after hello mismatch"

      always:
        # Teardown: revert hello-interval on D2B
        - name: "Teardown — revert hello-interval on D2B"
          ansible.netcommon.cli_config:
            config: |
              interface 1/1/2
              no ip ospf hello-interval
          delegate_to: D2B

        - name: "Wait for reconvergence"
          ansible.builtin.pause:
            seconds: 45

        - name: "Verify rollback — hello-interval on D2B"
          ansible.netcommon.cli_command:
            command: "show ip ospf interface 1/1/2"
          register: rollback_check
          delegate_to: D2B

        - name: "Assert rollback — hello-interval restored to 10"
          ansible.builtin.assert:
            that: "'10' in rollback_check.stdout"
            fail_msg: "ROLLBACK FAILED: hello-interval not restored to 10s on D2B"

# ══════════════════════════════════════════════════════════════════════════════
# TMISMATCH-02: Dead mismatch — Setup A1M, Verify D2B
# ══════════════════════════════════════════════════════════════════════════════
- name: "ospf_timer_TMISMATCH-02_A1M_D2B"

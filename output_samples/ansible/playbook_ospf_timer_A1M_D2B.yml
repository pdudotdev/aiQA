  gather_facts: false
  vars:
    rfc: "RFC 2328 Section 10.5"
    criterion: TMISMATCH-02
    setup_device: A1M
    verify_device: D2B
  tasks:
    - name: "[TMISMATCH-02] Dead mismatch — set dead=60 on A1M, verify adjacency drops on D2B"
      block:
        # Pre-flight: verify baseline dead-interval on A1M
        - name: "Pre-flight — snapshot dead-interval on A1M"
          ansible.netcommon.cli_command:
            command: "/routing ospf interface print detail where interface=ether3 without-paging"
          register: baseline
          delegate_to: A1M

        - name: "Pre-flight — assert dead-interval is 40"
          ansible.builtin.assert:
            that: "'dead-interval' in baseline.stdout and '40' in baseline.stdout"
            fail_msg: "Pre-flight failed: dead-interval not at baseline 40s on A1M"

        # Setup: configure mismatched dead on A1M
        - name: "Setup — set dead-interval 60s on A1M ether3"
          ansible.netcommon.cli_config:
            config: '/routing ospf interface-template set [find where networks~"10.1.1.4"] dead-interval=60'
          delegate_to: A1M

        - name: "Wait for dead timer expiry"
          ansible.builtin.pause:
            seconds: 45

        # Verify: check neighbor state on D2B
        - name: "Verify — check OSPF neighbor state on D2B"
          ansible.netcommon.cli_command:
            command: "show ip ospf neighbors"
          register: result

        - name: "Assert — neighbor 1.1.1.1 is NOT Full on D2B"
          ansible.builtin.assert:
            that: "'Full' not in result.stdout or '1.1.1.1' not in result.stdout"
            fail_msg: "[TMISMATCH-02] Neighbor 1.1.1.1 is still Full on D2B after dead mismatch"

      always:
        # Teardown: revert dead-interval on A1M
        - name: "Teardown — revert dead-interval on A1M"
          ansible.netcommon.cli_config:
            config: '/routing ospf interface-template set [find where networks~"10.1.1.4"] dead-interval='
          delegate_to: A1M

        - name: "Wait for reconvergence"
          ansible.builtin.pause:
            seconds: 45

        - name: "Verify rollback — dead-interval on A1M"
          ansible.netcommon.cli_command:
            command: "/routing ospf interface print detail where interface=ether3 without-paging"
          register: rollback_check
          delegate_to: A1M

        - name: "Assert rollback — dead-interval restored to 40"
          ansible.builtin.assert:
            that: "'40' in rollback_check.stdout"
            fail_msg: "ROLLBACK FAILED: dead-interval not restored to 40s on A1M"


        - name: "Verify — check neighbor state on A1M"
          ansible.netcommon.cli_command:
            command: "{{ query_cli }}"
          delegate_to: "{{ peer_host }}"
          register: result
        - name: "Assert adjacency is NOT Full"
          ansible.builtin.assert:
            that: "'Full' not in result.stdout or '{{ assert_match_rid }}' not in result.stdout"
            fail_msg: "[{{ criterion }}] Neighbor {{ assert_match_rid }} still Full on A1M"


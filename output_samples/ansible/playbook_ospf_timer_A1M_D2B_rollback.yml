---
# Emergency Rollback — OSPF Timer Mismatch Tests (A1M ↔ D2B)
# Run this to revert ALL timer changes if a test run was interrupted.
# Every task has ignore_errors: true so one failure won't block the rest.

- name: "Emergency rollback — A1M timer defaults"
  hosts: A1M
  gather_facts: false
  tasks:
    - name: "Revert hello-interval to default on A1M ether3"
      ansible.netcommon.cli_config:
        config: '/routing ospf interface-template set [find where networks~"10.1.1.4"] hello-interval='
      ignore_errors: true

    - name: "Revert dead-interval to default on A1M ether3"
      ansible.netcommon.cli_config:
        config: '/routing ospf interface-template set [find where networks~"10.1.1.4"] dead-interval='
      ignore_errors: true

- name: "Emergency rollback — D2B timer defaults"
  hosts: D2B
  gather_facts: false
  tasks:
    - name: "Revert hello-interval to default on D2B 1/1/2"
      ansible.netcommon.cli_config:
        config: |
          interface 1/1/2
            no ip ospf hello-interval
      ignore_errors: true

    - name: "Revert dead-interval to default on D2B 1/1/2"
      ansible.netcommon.cli_config:
        config: |
          interface 1/1/2
            no ip ospf dead-interval
      ignore_errors: true

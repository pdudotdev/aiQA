tests:
  - id: ospf_timer_TMISMATCH-01_A1M_D2B
    criterion: TMISMATCH-01
    rfc: "RFC 2328 §10.5"
    description: "Configure hello-interval mismatch on A1M, verify adjacency drops on D2B"
    device:
      name: A1M
      host: 172.20.20.201
      platform: mikrotik_routeros
      cli_style: routeros
      interface: ether3
      ip: 10.1.1.5
    peer:
      name: D2B
      host: 172.20.20.206
      platform: aruba_aoscx
      cli_style: aos
      rid: "11.11.11.22"
      interface: 1/1/2
      ip: 10.1.1.6
    context:
      area: 1
      area_type: stub
    query:
      ssh_cli: "show ip ospf neighbors"
    assertion:
      type: not_equal
      field: state
      expected: "Full"
      match_by:
        router_id: "1.1.1.1"
    setup:
      target: A1M
      ssh_cli: "/routing ospf interface-template set [find where networks~\"10.1.1.4\"] hello-interval=15"
      snapshot_cli: "/routing ospf interface print detail without-paging where interface=ether3"
      snapshot_field: hello-interval
      snapshot_expected: "10"
    wait:
      type: convergence
      seconds: 45
    teardown:
      ssh_cli: "/routing ospf interface-template set [find where networks~\"10.1.1.4\"] hello-interval="
      verify_cli: "/routing ospf interface print detail without-paging where interface=ether3"
      verify_field: hello-interval
      verify_expected: "10"


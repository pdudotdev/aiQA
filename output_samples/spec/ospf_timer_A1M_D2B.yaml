metadata:
  skill: ospf_timer
  protocol: ospf
  generated: "2026-04-01T00:00:00Z"
  intent_source: data/INTENT.json
  scope: A1M, D2B
  pair_count: 1
  test_count: 4

tests:
  # ────────────────────────────────────────────────────────────────────────────
  # TMISMATCH-01: Hello interval mismatch — Setup A1M, Verify D2B
  # ────────────────────────────────────────────────────────────────────────────
  - id: ospf_timer_TMISMATCH-01_A1M_D2B
    criterion: TMISMATCH-01
    rfc: "RFC 2328 Section 10.5"
    description: "Configure hello-interval 15s on A1M ether3 (default 10s), verify adjacency to D2B drops"
    device:
      name: A1M
      host: 172.20.20.201
      platform: mikrotik_routeros
      cli_style: routeros
      interface: ether3
      ip: 10.1.1.5
    peer:
      name: D2B
      host: 172.20.20.206
      platform: aruba_aoscx
      cli_style: aos
      rid: "11.11.11.22"
      interface: 1/1/2
      ip: 10.1.1.6
    context:
      area: 1
      area_type: stub
    query:
      ssh_cli: "show ip ospf neighbors"
    assertion:
      type: not_equal
      field: state
      expected: "Full"
      match_by:
        router_id: "1.1.1.1"
    setup:
      target: A1M
      ssh_cli: "/routing ospf interface-template set [find where networks~\"10.1.1.4\"] hello-interval=15"
      snapshot_cli: "/routing ospf interface print detail where interface=ether3 without-paging"
      snapshot_field: hello-interval
      snapshot_expected: "10"
    wait:
      type: fixed
      seconds: 45
    teardown:
      ssh_cli: "/routing ospf interface-template set [find where networks~\"10.1.1.4\"] hello-interval="
      verify_cli: "/routing ospf interface print detail where interface=ether3 without-paging"
      verify_field: hello-interval
      verify_expected: "10"


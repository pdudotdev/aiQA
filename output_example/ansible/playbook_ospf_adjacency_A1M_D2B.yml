---
# OSPF Adjacency Playbook — Scoped: A1M, D2B
# Run: ansible-playbook -i output/ansible/inventory.yml output/ansible/playbook_ospf_adjacency_A1M_D2B.yml
# JUnit: ANSIBLE_JUNIT_OUTPUT_DIR=output/ansible/ ansible-playbook ... (with junit callback)
#
# Generated: 2026-03-30
# Intent source: data/INTENT.json
# Pair: A1M (MikroTik RouterOS) <-> D2B (Aruba AOS-CX), Area 1 (stub)
# Total tests: 18

- name: "OSPF Adjacency Tests — A1M (MikroTik RouterOS)"
  hosts: A1M
  gather_facts: false
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # ----- ADJ-01: Interface Up -----
    - name: "[ADJ-01] Verify A1M interface ether3 line protocol is up toward D2B"
      vars:
        rfc: "RFC 2328 §9.1"
      block:
        - name: "Collect interface status"
          ansible.netcommon.cli_command:
            command: "/interface print brief without-paging"
          register: iface_output

        - name: "Assert ether3 is up"
          ansible.builtin.assert:
            that:
              - "'ether3' in iface_output.stdout"
              - "iface_output.stdout | regex_search('R.*ether3') is not none"
            fail_msg: "Interface ether3 on A1M is not up (expected line protocol up)"
            success_msg: "Interface ether3 on A1M is up"

    # ----- ADJ-02: Neighbor Presence (A1M -> D2B) -----
    - name: "[ADJ-02] Verify A1M sees D2B (RID 11.11.11.22) as OSPF neighbor"
      vars:
        rfc: "RFC 2328 §10.1"
      block:
        - name: "Collect OSPF neighbor table"
          ansible.netcommon.cli_command:
            command: "/routing ospf neighbor print detail without-paging"
          register: nbr_output

        - name: "Assert neighbor 11.11.11.22 is present"
          ansible.builtin.assert:
            that:
              - "'11.11.11.22' in nbr_output.stdout"
            fail_msg: "Neighbor RID 11.11.11.22 not found in A1M OSPF neighbor table"
            success_msg: "Neighbor 11.11.11.22 present on A1M"

    # ----- ADJ-03: State FULL (A1M -> D2B) -----
    - name: "[ADJ-03] Verify A1M adjacency with D2B (RID 11.11.11.22) is FULL"
      vars:
        rfc: "RFC 2328 §10.1"
      block:
        - name: "Collect OSPF neighbor detail"
          ansible.netcommon.cli_command:
            command: "/routing ospf neighbor print detail without-paging"
          register: nbr_detail_output

        - name: "Assert neighbor 11.11.11.22 state is Full"
          ansible.builtin.assert:
            that:
              - "nbr_detail_output.stdout | regex_search('router-id=11.11.11.22.*state=\"?[Ff]ull', multiline=True) is not none"
            fail_msg: "Neighbor 11.11.11.22 on A1M is not in FULL state"
            success_msg: "Neighbor 11.11.11.22 on A1M is in FULL state"

    # ----- ADJ-04: Area ID Match -----
    - name: "[ADJ-04] Verify A1M interface ether3 is assigned to OSPF area 0.0.0.1"
      vars:
        rfc: "RFC 2328 §10.5"
      block:
        - name: "Collect OSPF interface detail"
          ansible.netcommon.cli_command:
            command: "/routing ospf interface print detail without-paging"
          register: ospf_iface_output

        - name: "Assert ether3 area is 0.0.0.1"
          ansible.builtin.assert:
            that:
              - "ospf_iface_output.stdout | regex_search('ether3.*area=.*0\\.0\\.0\\.1', multiline=True) is not none"
            fail_msg: "Interface ether3 on A1M is not in area 0.0.0.1"
            success_msg: "Interface ether3 on A1M is in area 0.0.0.1"

    # ----- ADJ-05: Hello Timer -----
    - name: "[ADJ-05] Verify A1M interface ether3 OSPF hello interval is 10 seconds"
      vars:
        rfc: "RFC 2328 §10.5"
      block:
        - name: "Collect OSPF interface detail"
          ansible.netcommon.cli_command:
            command: "/routing ospf interface print detail without-paging"
          register: ospf_iface_hello

        - name: "Assert ether3 hello interval is 10"
          ansible.builtin.assert:
            that:
              - "ospf_iface_hello.stdout | regex_search('ether3.*hello-interval=10', multiline=True) is not none"
            fail_msg: "Hello interval on ether3 (A1M) is not 10 seconds"
            success_msg: "Hello interval on ether3 (A1M) is 10 seconds"

    # ----- ADJ-05: Dead Timer -----
    - name: "[ADJ-05] Verify A1M interface ether3 OSPF dead interval is 40 seconds"
      vars:
        rfc: "RFC 2328 §10.5"
      block:
        - name: "Collect OSPF interface detail"
          ansible.netcommon.cli_command:
            command: "/routing ospf interface print detail without-paging"
          register: ospf_iface_dead

        - name: "Assert ether3 dead interval is 40"
          ansible.builtin.assert:
            that:
              - "ospf_iface_dead.stdout | regex_search('ether3.*dead-interval=40', multiline=True) is not none"
            fail_msg: "Dead interval on ether3 (A1M) is not 40 seconds"
            success_msg: "Dead interval on ether3 (A1M) is 40 seconds"

    # ----- ADJ-06: Stub Agreement -----
    - name: "[ADJ-06] Verify A1M interface ether3 area type is stub (area 1)"
      vars:
        rfc: "RFC 2328 §11"
      block:
        - name: "Collect OSPF area detail"
          ansible.netcommon.cli_command:
            command: "/routing ospf area print detail without-paging"
          register: ospf_area_output

        - name: "Assert area type is stub"
          ansible.builtin.assert:
            that:
              - "ospf_area_output.stdout | regex_search('type=stub', multiline=True) is not none"
            fail_msg: "Area type for area 1 on A1M is not stub"
            success_msg: "Area 1 on A1M is configured as stub"

    # ----- ADJ-07: MTU Match -----
    - name: "[ADJ-07] Verify A1M interface ether3 MTU is 1500"
      vars:
        rfc: "RFC 2328 §10.6"
      block:
        - name: "Collect interface brief"
          ansible.netcommon.cli_command:
            command: "/interface print brief without-paging"
          register: iface_mtu_output

        - name: "Assert ether3 MTU is 1500"
          ansible.builtin.assert:
            that:
              - "iface_mtu_output.stdout | regex_search('ether3.*1500', multiline=True) is not none"
            fail_msg: "MTU on ether3 (A1M) is not 1500"
            success_msg: "MTU on ether3 (A1M) is 1500"

    # ----- ADJ-08: Router ID Unique -----
    - name: "[ADJ-08] Verify A1M OSPF router ID is 1.1.1.1"
      vars:
        rfc: "RFC 2328 §C.1"
      block:
        - name: "Collect OSPF instance detail"
          ansible.netcommon.cli_command:
            command: "/routing ospf instance print detail without-paging"
          register: ospf_instance_output

        - name: "Assert router ID is 1.1.1.1"
          ansible.builtin.assert:
            that:
              - "'router-id=1.1.1.1' in ospf_instance_output.stdout"
            fail_msg: "Router ID on A1M is not 1.1.1.1"
            success_msg: "Router ID on A1M is 1.1.1.1"


- name: "OSPF Adjacency Tests — D2B (Aruba AOS-CX)"
  hosts: D2B
  gather_facts: false
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: arubanetworks.aoscx.aoscx

  tasks:
    # ----- ADJ-01: Interface Up -----
    - name: "[ADJ-01] Verify D2B interface 1/1/2 line protocol is up toward A1M"
      vars:
        rfc: "RFC 2328 §9.1"
      block:
        - name: "Collect interface status"
          ansible.netcommon.cli_command:
            command: "show interface brief"
          register: iface_output

        - name: "Assert 1/1/2 is up"
          ansible.builtin.assert:
            that:
              - "'1/1/2' in iface_output.stdout"
              - "iface_output.stdout | regex_search('1/1/2.*up', multiline=True) is not none"
            fail_msg: "Interface 1/1/2 on D2B is not up (expected line protocol up)"
            success_msg: "Interface 1/1/2 on D2B is up"

    # ----- ADJ-02: Neighbor Presence (D2B -> A1M) -----
    - name: "[ADJ-02] Verify D2B sees A1M (RID 1.1.1.1) as OSPF neighbor"
      vars:
        rfc: "RFC 2328 §10.1"
      block:
        - name: "Collect OSPF neighbor table"
          ansible.netcommon.cli_command:
            command: "show ip ospf neighbors"
          register: nbr_output

        - name: "Assert neighbor 1.1.1.1 is present"
          ansible.builtin.assert:
            that:
              - "'1.1.1.1' in nbr_output.stdout"
            fail_msg: "Neighbor RID 1.1.1.1 not found in D2B OSPF neighbor table"
            success_msg: "Neighbor 1.1.1.1 present on D2B"

    # ----- ADJ-03: State FULL (D2B -> A1M) -----
    - name: "[ADJ-03] Verify D2B adjacency with A1M (RID 1.1.1.1) is FULL"
      vars:
        rfc: "RFC 2328 §10.1"
      block:
        - name: "Collect OSPF neighbor table"
          ansible.netcommon.cli_command:
            command: "show ip ospf neighbors"
          register: nbr_detail_output

        - name: "Assert neighbor 1.1.1.1 state is FULL"
          ansible.builtin.assert:
            that:
              - "nbr_detail_output.stdout | regex_search('1\\.1\\.1\\.1.*FULL', multiline=True) is not none"
            fail_msg: "Neighbor 1.1.1.1 on D2B is not in FULL state"
            success_msg: "Neighbor 1.1.1.1 on D2B is in FULL state"

    # ----- ADJ-04: Area ID Match -----
    - name: "[ADJ-04] Verify D2B interface 1/1/2 is assigned to OSPF area 0.0.0.1"
      vars:
        rfc: "RFC 2328 §10.5"
      block:
        - name: "Collect OSPF interface detail"
          ansible.netcommon.cli_command:
            command: "show ip ospf interface"
          register: ospf_iface_output

        - name: "Assert 1/1/2 area is 0.0.0.1"
          ansible.builtin.assert:
            that:
              - "ospf_iface_output.stdout | regex_search('1/1/2.*[Aa]rea.*0\\.0\\.0\\.1', multiline=True) is not none"
            fail_msg: "Interface 1/1/2 on D2B is not in area 0.0.0.1"
            success_msg: "Interface 1/1/2 on D2B is in area 0.0.0.1"

    # ----- ADJ-05: Hello Timer -----
    - name: "[ADJ-05] Verify D2B interface 1/1/2 OSPF hello interval is 10 seconds"
      vars:
        rfc: "RFC 2328 §10.5"
      block:
        - name: "Collect OSPF interface detail"
          ansible.netcommon.cli_command:
            command: "show ip ospf interface"
          register: ospf_iface_hello

        - name: "Assert 1/1/2 hello interval is 10"
          ansible.builtin.assert:
            that:
              - "ospf_iface_hello.stdout | regex_search('1/1/2[\\s\\S]*?[Hh]ello.*10', multiline=True) is not none"
            fail_msg: "Hello interval on 1/1/2 (D2B) is not 10 seconds"
            success_msg: "Hello interval on 1/1/2 (D2B) is 10 seconds"

    # ----- ADJ-05: Dead Timer -----
    - name: "[ADJ-05] Verify D2B interface 1/1/2 OSPF dead interval is 40 seconds"
      vars:
        rfc: "RFC 2328 §10.5"
      block:
        - name: "Collect OSPF interface detail"
          ansible.netcommon.cli_command:
            command: "show ip ospf interface"
          register: ospf_iface_dead

        - name: "Assert 1/1/2 dead interval is 40"
          ansible.builtin.assert:
            that:
              - "ospf_iface_dead.stdout | regex_search('1/1/2[\\s\\S]*?[Dd]ead.*40', multiline=True) is not none"
            fail_msg: "Dead interval on 1/1/2 (D2B) is not 40 seconds"
            success_msg: "Dead interval on 1/1/2 (D2B) is 40 seconds"

    # ----- ADJ-06: Stub Agreement -----
    - name: "[ADJ-06] Verify D2B interface 1/1/2 area type is stub (area 1)"
      vars:
        rfc: "RFC 2328 §11"
      block:
        - name: "Collect OSPF process detail"
          ansible.netcommon.cli_command:
            command: "show ip ospf"
          register: ospf_process_output

        - name: "Assert area 1 type is stub"
          ansible.builtin.assert:
            that:
              - "ospf_process_output.stdout | regex_search('[Aa]rea.*0\\.0\\.0\\.1[\\s\\S]*?[Ss]tub', multiline=True) is not none"
            fail_msg: "Area type for area 1 on D2B is not stub"
            success_msg: "Area 1 on D2B is configured as stub"

    # ----- ADJ-07: MTU Match -----
    - name: "[ADJ-07] Verify D2B interface 1/1/2 MTU is 1500"
      vars:
        rfc: "RFC 2328 §10.6"
      block:
        - name: "Collect interface brief"
          ansible.netcommon.cli_command:
            command: "show interface brief"
          register: iface_mtu_output

        - name: "Assert 1/1/2 MTU is 1500"
          ansible.builtin.assert:
            that:
              - "iface_mtu_output.stdout | regex_search('1/1/2.*1500', multiline=True) is not none"
            fail_msg: "MTU on 1/1/2 (D2B) is not 1500"
            success_msg: "MTU on 1/1/2 (D2B) is 1500"

    # ----- ADJ-08: Router ID Unique -----
    - name: "[ADJ-08] Verify D2B OSPF router ID is 11.11.11.22"
      vars:
        rfc: "RFC 2328 §C.1"
      block:
        - name: "Collect OSPF process detail"
          ansible.netcommon.cli_command:
            command: "show ip ospf"
          register: ospf_rid_output

        - name: "Assert router ID is 11.11.11.22"
          ansible.builtin.assert:
            that:
              - "'11.11.11.22' in ospf_rid_output.stdout"
            fail_msg: "Router ID on D2B is not 11.11.11.22"
            success_msg: "Router ID on D2B is 11.11.11.22"
